<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mockup A — DF1 Blob</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F3F4F6; --surface:#FFFFFF; --ink:#12171E; --slate:#586273;
    --faint:#8A93A0; --line:#E4E7EC; --line2:#EDEFF2; --signal:#0F6E66;
    --signalsoft:rgba(15,110,102,.10);
    --sans:'IBM Plex Sans',ui-sans-serif,-apple-system,'Segoe UI',Roboto,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace; --r:6px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper); color:var(--ink); font-family:var(--sans); -webkit-font-smoothing:antialiased; line-height:1.55}
  .wrap{max-width:760px; margin:0 auto; padding:30px 26px 56px}
  .mono{font-family:var(--mono); font-variant-numeric:tabular-nums}
  .eyebrow{font-size:11px; font-weight:500; letter-spacing:.14em; text-transform:uppercase; color:var(--slate)}

  .top{display:flex; align-items:center; justify-content:space-between; padding-bottom:18px}
  .brand{display:flex; align-items:center; gap:10px}
  .mark{width:22px; height:22px; border-radius:5px; border:1.5px solid var(--ink); position:relative}
  .mark::after{content:""; position:absolute; left:50%; top:3px; bottom:3px; width:1.5px; background:var(--signal); transform:translateX(-50%)}
  .word{font-weight:600; font-size:15px}
  .rail{height:3px; background:var(--line); border-radius:100px; overflow:hidden}
  .rail i{display:block; height:100%; width:25%; background:var(--signal); border-radius:100px}
  .railrow{display:flex; align-items:center; gap:12px; margin:4px 0 22px}
  .railrow span{font-size:11px; color:var(--faint)}
  .railrow .rail{flex:1}

  h1{font-size:26px; font-weight:600; letter-spacing:-.015em; margin:8px 0 8px; line-height:1.18}
  .sub{color:var(--slate); font-size:14px; max-width:58ch; margin:0}

  .stage{position:relative; width:480px; max-width:100%; margin:18px auto 6px; aspect-ratio:1/1}
  svg{display:block; width:100%; height:100%; overflow:visible; touch-action:none}
  .axis{stroke:var(--line); stroke-width:1}
  .ring{fill:none; stroke:var(--line2); stroke-width:1}
  .spoke{stroke:var(--line); stroke-width:1; stroke-dasharray:2 4}
  .blob{fill:var(--signalsoft); stroke:var(--signal); stroke-width:2; stroke-linejoin:round}
  .handle{fill:var(--surface); stroke:var(--signal); stroke-width:2.5; cursor:grab}
  .handle:active{cursor:grabbing}
  .handle.foc{stroke-width:3}
  .hcore{fill:var(--signal)}

  .corner{position:absolute; width:150px}
  .corner .cn{font-size:13px; font-weight:500; line-height:1.25}
  .corner .co{font-size:10px; color:var(--faint); letter-spacing:.02em}
  .corner .cv{display:flex; align-items:center; gap:8px; margin-top:5px}
  .corner .cv b{font-family:var(--mono); font-size:13px; font-weight:500}
  .pips{display:flex; gap:3px}
  .pips s{width:7px; height:7px; border-radius:50%; background:var(--line); display:block}
  .pips s.on{background:var(--signal)}
  .tl{top:0; left:0; text-align:left}
  .tr{top:0; right:0; text-align:right}
  .tr .cv{justify-content:flex-end}
  .bl{bottom:0; left:0; text-align:left}
  .br{bottom:0; right:0; text-align:right}
  .br .cv{justify-content:flex-end}

  .footrow{display:flex; align-items:center; justify-content:space-between; gap:14px; margin-top:26px; padding-top:18px; border-top:1px solid var(--line); flex-wrap:wrap}
  .profile{font-size:12px; color:var(--slate)}
  .profile b{color:var(--ink); font-weight:500}
  .btn{font-family:var(--sans); font-size:14px; font-weight:500; color:var(--surface); background:var(--signal); border:none; border-radius:var(--r); padding:10px 20px; cursor:pointer; display:inline-flex; align-items:center; gap:8px}
  .btn:hover{filter:brightness(1.07)}

  @media(max-width:560px){
    .corner{width:120px}
    .corner .cn{font-size:12px}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><div class="mark" aria-hidden="true"></div><div class="word">Scan <span style="color:var(--signal)">IT</span></div></div>
    <div class="eyebrow">Paso 1 / 4</div>
  </div>
  <div class="railrow">
    <div class="rail"><i></i></div>
    <span class="mono">DF1</span>
  </div>

  <div class="eyebrow">Enterprise Strategy</div>
  <h1>¿Qué estrategia mueve a tu empresa?</h1>
  <p class="sub">Estira cada vértice según cuánto pesa esa estrategia hoy. Son independientes: todas pueden ir al máximo, o quedar muy distintas entre sí.</p>

  <div class="stage" id="stage">
    <svg id="svg" viewBox="0 0 480 480" role="img" aria-label="Cuadrante de estrategia con cuatro vértices ajustables de 1 a 5">
      <line class="axis" x1="240" y1="34" x2="240" y2="446"/>
      <line class="axis" x1="34" y1="240" x2="446" y2="240"/>
      <g id="rings"></g>
      <g id="spokes"></g>
      <path id="blob" class="blob"/>
      <g id="handles"></g>
    </svg>
    <div class="corner tl" id="c1"></div>
    <div class="corner tr" id="c0"></div>
    <div class="corner bl" id="c2"></div>
    <div class="corner br" id="c3"></div>
  </div>

  <div class="footrow">
    <div class="profile" id="profile"></div>
    <button class="btn">Continuar</button>
  </div>
</div>

<script>
const C=240, RMIN=56, RMAX=206;
const OPT=[
  {nm:'Crecimiento y adquisiciones', of:'Growth / Acquisition',      u:[ 0.7071,-0.7071], pos:'tr'},
  {nm:'Innovación y diferenciación', of:'Innovation / Differentiation',u:[-0.7071,-0.7071], pos:'tl'},
  {nm:'Liderazgo en costos',         of:'Cost Leadership',             u:[-0.7071, 0.7071], pos:'bl'},
  {nm:'Servicio al cliente y estabilidad', of:'Client Service / Stability', u:[0.7071,0.7071], pos:'br'},
];
const PATH_ORDER=[1,0,3,2];
let val=[3,3,3,3];
const radius=v=>RMIN+(v-1)/4*(RMAX-RMIN);
const px=i=>({x:C+radius(val[i])*OPT[i].u[0], y:C+radius(val[i])*OPT[i].u[1]});

const rings=document.getElementById('rings');
for(let v=1;v<=5;v++){const r=radius(v);
  rings.innerHTML+=`<circle class="ring" cx="${C}" cy="${C}" r="${r}"/>`;}
const spokes=document.getElementById('spokes');
OPT.forEach(o=>{spokes.innerHTML+=`<line class="spoke" x1="${C}" y1="${C}" x2="${C+RMAX*o.u[0]}" y2="${C+RMAX*o.u[1]}"/>`;});

function catmull(){
  const p=PATH_ORDER.map(px), n=p.length;
  let d=`M ${p[0].x.toFixed(1)} ${p[0].y.toFixed(1)}`;
  for(let i=0;i<n;i++){
    const p0=p[(i-1+n)%n],p1=p[i],p2=p[(i+1)%n],p3=p[(i+2)%n];
    const c1x=p1.x+(p2.x-p0.x)/6, c1y=p1.y+(p2.y-p0.y)/6;
    const c2x=p2.x-(p3.x-p1.x)/6, c2y=p2.y-(p3.y-p1.y)/6;
    d+=` C ${c1x.toFixed(1)} ${c1y.toFixed(1)} ${c2x.toFixed(1)} ${c2y.toFixed(1)} ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`;
  }
  return d+' Z';
}

const handlesG=document.getElementById('handles');
OPT.forEach((o,i)=>{
  handlesG.innerHTML+=`<g class="hg" data-i="${i}" tabindex="0" role="slider" aria-valuemin="1" aria-valuemax="5" aria-label="${o.nm}">
    <circle class="handle" r="11"/><circle class="hcore" r="3.5"/></g>`;
});

function render(){
  document.getElementById('blob').setAttribute('d',catmull());
  OPT.forEach((o,i)=>{
    const p=px(i);
    const g=handlesG.children[i];
    g.querySelector('.handle').setAttribute('cx',p.x); g.querySelector('.handle').setAttribute('cy',p.y);
    g.querySelector('.hcore').setAttribute('cx',p.x); g.querySelector('.hcore').setAttribute('cy',p.y);
    g.setAttribute('aria-valuenow',val[i]);
    const c=document.getElementById('c'+i);
    c.innerHTML=`<div class="cn">${o.nm}</div><div class="co">${o.of}</div>
      <div class="cv"><b>${val[i]}<span style="color:var(--faint)">/5</span></b>
      <span class="pips">${[1,2,3,4,5].map(k=>`<s class="${k<=val[i]?'on':''}"></s>`).join('')}</span></div>`;
  });
  document.getElementById('profile').innerHTML=
    `Perfil: ${OPT.map((o,i)=>`<b>${o.nm.split(' ')[0]} ${val[i]}</b>`).join(' · ')}`;
}

const svg=document.getElementById('svg');
function toSvg(e){const pt=svg.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());}
let drag=-1;
function setFromPointer(i,e){
  const p=toSvg(e); const proj=(p.x-C)*OPT[i].u[0]+(p.y-C)*OPT[i].u[1];
  const t=(Math.max(RMIN,Math.min(RMAX,proj))-RMIN)/(RMAX-RMIN);
  val[i]=Math.max(1,Math.min(5,Math.round(1+t*4))); render();
}
handlesG.querySelectorAll('.hg').forEach(g=>{
  const i=+g.dataset.i;
  g.addEventListener('pointerdown',e=>{drag=i; g.querySelector('.handle').classList.add('foc'); g.setPointerCapture(e.pointerId); e.preventDefault();});
  g.addEventListener('pointermove',e=>{if(drag===i) setFromPointer(i,e);});
  g.addEventListener('pointerup',e=>{drag=-1; g.querySelector('.handle').classList.remove('foc');});
  g.addEventListener('keydown',e=>{
    if(e.key==='ArrowUp'||e.key==='ArrowRight'){val[i]=Math.min(5,val[i]+1);render();e.preventDefault();}
    if(e.key==='ArrowDown'||e.key==='ArrowLeft'){val[i]=Math.max(1,val[i]-1);render();e.preventDefault();}
  });
});
render();
</script>
</body>
</html>
